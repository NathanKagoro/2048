    &nbsp; &nbsp;

    <!--Settings button that activates the side bar-->
    <button type="button" class="button" id="settings" onclick="sidebar_check()">
        <ion-icon name="cog" float-right></ion-icon>
        <p class="button-text"> Settings </p>
    </button>

    <!--Collapsable Side bar code-->
    <div class="sidebar closed">
            <ul class="nav nav-pills flex-column mb-auto">

            </li>
            <li>
                <a href="#" class="nav-link text-black">
                <svg class="bi pe-none me-2" width="16" height="16"><use xlink:href="#speedometer2"></use></svg>
                Game difficulty
                </a>
            </li>
            </ul>
        </div>
    </div>

    <!--Function to collapse and activate sidebar-->
    <script>

        let check = false;

        function sidebar_check(){

            if(!check){
                check = true;
            }
            else{
                check = false;
            }
            sidebar();
        }

        function sidebar(){
            if (sidebar){
                document.querySelector('.closed').classList.toggle('open');
            }
            else{
                document.querySelector('.open').classList.toggle('closed');
            }
        }
    </script>
</header>
