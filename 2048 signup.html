<!DOCTYPE html>
<html>

<head>
  <!--Links to bootstrap and local stylesheets-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="2048 stylesheet.css">
    
  <title>2048 sign up</title>
</head>


<body class="container">
	
	<br><br><br><br><br>
  <!--2048 heading that doubles as a link to the first page-->
	<div class="text-center"> <a href="2048 entry.html"><button id="heading">2048</button> </a></div>

	<main class="form-signin w-25 m-auto">
    <!--sign up heading-->
		<div class="text-center"></div><h1 class="h2 mb-3 fw-normal">Sign up</h1>

  <!--Sign up form created with bootstrap linking to difficulty page after submition-->
	<form id="signup_form">

    <div class="form-floating">
      <input type="text" class="form-control" name="username_input" id="floatingInput" placeholder="name@example.com">
      <label for="floatingInput">Username</label>
    </div> 
  <br>
    <div class="form-floating">
      <input type="date" class="form-control" name="birthday_input" id="floatingPassword" placeholder="Date of birth">
      <label for="floatingPassword">Date of birth</label>
    </div>
  <br> 
    <div class="form-floating">
      <input type="password" class="form-control" name="password_input" id="floatingPassword" placeholder="Password">
      <label for="floatingPassword">Password</label>
    </div>
	<br> 
  <div class="form-floating">
    <input type="password" class="form-control" name="check_password" id="floatingPassword" placeholder="Confirm Password">
    <label for="floatingPassword">Confirm Password</label>
  </div>
  <br>
    <div class="text-center"><button class="btn btn-primary col-6 py-6 center" type="submit">Sign up</button></div>
    </form>
	
	<div class="text-center"><p> Already have an account? <a href="2048 login.html"> Log in here </a> </p></div>
	</main>	

  <script>

    const form = document.querySelector('form');

    var lowerCaseLetters = /[a-z]/g;
    var upperCaseLetters = /[A-Z]/g;
    var numbers = /[0-9]/g;

    function pass_validation(password){
      check = false;
      if(password.match(lowerCaseLetters)){
        if(password.match(upperCaseLetters)){
          if(password.match(numbers)){
            check = true;
          }
          else{
            alert("Passwords must have numbers.")
          }
        }
        else{
          alert("Passwords must have uppercase letters.")
        }
      }
      else{
        alert("Passwords must have lowercase letters.");
      }

      return check;
    }


    form.addEventListener('submit', (e) =>{
      e.preventDefault();

      let username = document.getElementById("signup_form").username_input.value;
      let password = document.getElementById("signup_form").password_input.value;
      let check_password = document.getElementById("signup_form").check_password.value;
      let DOB = document.getElementById("signup_form").birthday_input.value;
      let DOC = new Date();

      let user = {
        "username":username,
        "password":password, 
        "DOB":DOB,
        "DOC":DOC,
        "Highscore":0
      };

      let user_json = JSON.stringify(user);

      if (password == check_password){
        if(pass_validation(password)){
          localStorage.setItem(username, user_json);
          sessionStorage.loggedInUser = username;
          window.location.href = "2048 difficulty.html";
        }
      }
      else{
        alert("Passwords must match.");
      }
    })
 
  </script>
  
</body>
