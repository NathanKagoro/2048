<!DOCTYPE html>
<html>

<head>
    <!--Links to bootstrap and local stylesheets-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="2048 stylesheet.css">
    <link rel="stylesheet" href="2048 leaderboard.css">

    <title>2048 Leaderboard</title>
</head>

<header>
    <!--Link to ion icons framework-->
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>

    <!--Leaderboard button linking to leaderboard page-->
    <button type="button" class="button" id="leaderboard-icon" onclick="to_game()">
        <ion-icon name="logo-game-controller-b" item-right></ion-icon>
        <p class="button-text"> Game play </p>
    </button>

    &nbsp; &nbsp;
    <!--Settings button that activates the side bar-->
    <button type="button" class="button" id="settings-icon" onclick="sidebar_check()">
        <ion-icon name="cog" float-right></ion-icon>
        <p class="button-text"> Settings </p>
    </button>

    <!--Collapsable Side bar code-->
    <div class="sidebar closed">
            <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="2048 login.html" class="nav-link text-black" aria-current="page">
                <svg class="bi pe-none me-2" width="16" height="16"><use xlink:href="#home"></use></svg>
                Change accounts
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-black">
                <svg class="bi pe-none me-2" width="16" height="16"><use xlink:href="#speedometer2"></use></svg>
                Game difficulty
                </a>
            </li>
            </ul>
        </div>
    </div>

  <!--Function to collapse and activate sidebar-->
  <script>
        function to_game(){
          if(sessionStorage.loggedInUser == "Guest"){
            window.location.href = "2048 game guest.html"
          }
          else{
            window.location.href = "2048 game.html"
          }
      }

    
        let check = false;

        function sidebar_check(){

            if(!check){
                check = true;
            }
            else{
                check = false;
            }
            sidebar();
        }

        function sidebar(){
            if (sidebar){
                document.querySelector('.closed').classList.toggle('open');
            }
            else{
                document.querySelector('.open').classList.toggle('closed');
            }
        }
    </script>
</header>

<body class="container">
  <!--2048 heading that doubles as a link to the first page-->
	<div class="text-center"> <a href="2048 entry.html"><button id="heading">2048</button> </a></div>

  <!--Leaderboard heading-->
    <h1 id="leaderboard-header">Leaderboard</h1>

    <main>
        <!--Leaderboard table -->
        <div id="leaderboard">
          <table>
            <tr>
              <td class="number" >1</td>
              <td class="name" id ="first_name" >Lee</td>
              <td class="points" id="first_points"> 32</td>
            </tr>
            <tr>
              <td class="number">2</td>
              <td class="name" id="second_name">Mark</td>
              <td class="points" id="second_points">16</td>
            </tr>
            <tr>
              <td class="number">3</td>
              <td class="name" id="third_name">Derick</td>
              <td class="points" id="third_points">8</td>
            </tr>
            <tr>
              <td class="number">4</td>
              <td class="name" id="fourth_name">Quan</td>
              <td class="points" id="fourth_points">4</td>
            </tr>
            <tr>
              <td class="number">5</td>
              <td class="name" id="fifth_name">Johnny</td>
              <td class="points" id="fifth_points">2</td>
            </tr>
          </table>
        </div>
      </main>

      <script src="2048 leaderboard.js" defer></script>
</body>
